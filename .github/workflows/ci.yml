name: Fury CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # -------------------------
  # PYTHON BACKEND CHECKS
  # -------------------------
  backend:
    name: Backend checks
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install python-dotenv pyyaml openai fastapi uvicorn pydantic

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,node_modules,.venv
        continue-on-error: true

      - name: Check core imports
        run: |
          cd backend
          python -c "from core.config_loader import cfg; print('Config OK:', cfg.fury.name)"
          python -c "from brain.pattern_recognizer import analyze_patterns; print('PatternRecognizer OK')"
          python -c "from core.safety_sandbox import is_blocked; print('SafetySandbox OK')"
          python -c "from core.permission_system import CAPABILITIES; print('PermissionSystem OK:', len(CAPABILITIES), 'capabilities')"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # -------------------------
  # FRONTEND CHECKS
  # -------------------------
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        continue-on-error: true